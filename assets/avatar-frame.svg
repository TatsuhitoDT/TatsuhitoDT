<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Executive avatar frame">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e63946"/>
      <stop offset="0.5" stop-color="#457b9d"/>
      <stop offset="1" stop-color="#2a9d8f"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#11161d"/>
      <stop offset="1" stop-color="#0d1117"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <circle cx="160" cy="160" r="156" fill="url(#core)" stroke="#1d2733" stroke-width="2"/>

  <!-- rotating accent ring -->
  <g filter="url(#soft)">
    <circle cx="160" cy="160" r="146" fill="none" stroke="url(#ring)" stroke-width="5" stroke-linecap="round" stroke-dasharray="540 380">
      <animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- counter-rotating inner ticks -->
  <g stroke="#2a9d8f" stroke-width="2" opacity="0.65">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360 160 160" to="0 160 160" dur="22s" repeatCount="indefinite"/>
      <line x1="160" y1="26" x2="160" y2="42"/>
      <line x1="160" y1="278" x2="160" y2="294"/>
      <line x1="26" y1="160" x2="42" y2="160"/>
      <line x1="278" y1="160" x2="294" y2="160"/>
      <line x1="66" y1="66" x2="78" y2="78"/>
      <line x1="254" y1="66" x2="242" y2="78"/>
      <line x1="66" y1="254" x2="78" y2="242"/>
      <line x1="254" y1="254" x2="242" y2="242"/>
    </g>
  </g>

  <!-- avatar placeholder portrait area (replace via GitHub avatar overlay) -->
  <clipPath id="clip"><circle cx="160" cy="160" r="118"/></clipPath>
  <circle cx="160" cy="160" r="118" fill="#0d1117" stroke="#3a4654" stroke-width="1.5"/>
  <g clip-path="url(#clip)">
    <rect x="42" y="42" width="236" height="236" fill="#0f1620"/>
    <!-- stylized monogram -->
    <text x="160" y="196" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="96" font-weight="700" fill="url(#ring)" text-anchor="middle">TM</text>
  </g>

  <!-- title badge -->
  <g>
    <rect x="92" y="252" width="136" height="30" rx="15" fill="#11161d" stroke="#e63946" stroke-width="1.5"/>
    <text x="160" y="272" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9" text-anchor="middle">Dragon Tech</text>
  </g>
</svg>
